services:
  mongodb:
    image: mongo:7
    container_name: flowtask-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: flowtask
      MONGO_INITDB_ROOT_PASSWORD: flowtask123
      MONGO_INITDB_DATABASE: flowtask
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express
    container_name: flowtask-mongo-ui
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: flowtask
      ME_CONFIG_MONGODB_ADMINPASSWORD: flowtask123
      ME_CONFIG_MONGODB_URL: mongodb://flowtask:flowtask123@mongodb:27017/
    depends_on:
      - mongodb

volumes:
  mongo_data: